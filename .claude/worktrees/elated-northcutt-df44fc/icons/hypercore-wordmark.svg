<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" role="img" aria-labelledby="title desc">
  <title id="title">HyperCore AI wordmark</title>
  <desc id="desc">HyperCore AI logo with HC monogram and green tech wordmark.</desc>
  <defs>
    <linearGradient id="hcGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8ff3d"/>
      <stop offset="55%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#05c7ff"/>
    </linearGradient>
    <linearGradient id="hcDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1614"/>
      <stop offset="100%" stop-color="#08110f"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#00e676" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#softGlow)">
    <rect x="16" y="20" width="120" height="120" rx="34" fill="url(#hcDark)" stroke="rgba(255,255,255,0.12)"/>
    <path d="M44 48h20v24h24V48h20v64H88V88H64v24H44z" fill="url(#hcGlow)"/>
    <path d="M112 48h-2c-18 0-32 14-32 32s14 32 32 32h2v-18h-2c-8 0-14-6-14-14s6-14 14-14h2z" fill="#ffffff" fill-opacity="0.94"/>
    <circle cx="116" cy="40" r="6" fill="#b8ff3d"/>
  </g>

  <g transform="translate(168 40)">
    <text x="0" y="38" fill="#f5f7f6" font-size="54" font-weight="800" font-family="Segoe UI, Arial, sans-serif" letter-spacing="1.5">HYPERCORE</text>
    <text x="398" y="38" fill="url(#hcGlow)" font-size="54" font-weight="800" font-family="Segoe UI, Arial, sans-serif" letter-spacing="1.5">AI</text>
    <text x="2" y="74" fill="#8da19a" font-size="15" font-weight="600" font-family="Segoe UI, Arial, sans-serif" letter-spacing="6">COACHING PERFORMANCE NUTRITION</text>
  </g>
</svg>
